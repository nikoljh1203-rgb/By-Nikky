<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By Nikky — Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --burgundy: #6B1F3A; --burgundy-dark: #4A1228;
    --blush: #F5E6EC; --ivory: #FDF8F5; --gold: #C9A96E; --gold-light: #E8D5B0;
    --charcoal: #2C2C2C; --gray: #8A8A8A; --gray-light: #F0EBEE; --white: #FFFFFF;
    --success: #4A7C59; --warning: #B8860B; --danger: #8B2F2F;
    --shadow: 0 2px 20px rgba(107,31,58,0.1); --shadow-md: 0 4px 30px rgba(107,31,58,0.15);
  }
  body { font-family: 'Inter', sans-serif; background: var(--blush); color: var(--charcoal); min-height: 100vh; overflow-x: hidden; }

  /* LOGIN */
  #loginScreen { min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1; }
  .login-card { background:var(--white);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:var(--shadow-md);text-align:center; }
  .brand-logo .ribbon { display:inline-block;background:var(--burgundy);color:var(--gold);font-family:'Cormorant Garant',serif;font-size:2.2rem;font-weight:600;letter-spacing:0.12em;padding:10px 32px;border-radius:4px; }
  .brand-tagline { font-family:'Cormorant Garant',serif;font-size:0.9rem;font-style:italic;color:var(--gray);letter-spacing:0.2em;margin-bottom:36px;margin-top:8px; }
  .gold-divider { width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto; }
  .form-group { margin-bottom:20px;text-align:left; }
  .form-group label { display:block;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--burgundy);margin-bottom:8px; }
  .form-group input, .form-group select, .form-group textarea { width:100%;padding:12px 16px;border:1.5px solid var(--gold-light);border-radius:10px;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--charcoal);background:var(--ivory);outline:none;transition:border-color 0.2s; }
  .form-group input:focus, .form-group select:focus { border-color:var(--burgundy); }
  .btn { display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s; }
  .btn-primary { background:var(--burgundy);color:var(--white);width:100%; }
  .btn-primary:hover { background:var(--burgundy-dark); }
  .btn-gold { background:var(--gold);color:var(--white); }
  .btn-outline { background:transparent;color:var(--burgundy);border:1.5px solid var(--burgundy); }
  .btn-outline:hover { background:var(--blush); }
  .btn-danger { background:var(--danger);color:var(--white); }
  .btn-sm { padding:8px 16px;font-size:0.82rem;border-radius:8px; }
  .btn-xs { padding:5px 10px;font-size:0.78rem;border-radius:6px; }

  /* APP */
  #app { display:none;min-height:100vh; }
  .topbar { position:fixed;top:0;left:0;right:0;background:var(--burgundy);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2); }
  .topbar-brand { font-family:'Cormorant Garant',serif;font-size:1.5rem;font-weight:600;color:var(--gold);letter-spacing:0.1em; }
  .topbar-right { display:flex;align-items:center;gap:12px; }
  .user-pill { display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);padding:6px 12px;border-radius:20px; }
  .user-pill .avatar { width:28px;height:28px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:var(--burgundy); }
  .user-pill .name { color:var(--white);font-size:0.82rem;font-weight:500; }
  .user-pill .role { color:var(--gold-light);font-size:0.72rem; }
  .logout-btn { background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.7);font-size:1rem;padding:4px; }
  .bottom-nav { position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gold-light);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(107,31,58,0.1); }
  .nav-item { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--gray);font-size:0.68rem;font-weight:500;gap:3px;transition:color 0.2s;text-transform:uppercase; }
  .nav-item .nav-icon { font-size:1.3rem; }
  .nav-item.active { color:var(--burgundy); }

  @media (min-width:768px) {
    .bottom-nav { display:none; }
    .topbar { left:240px; }
    .sidebar { position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--burgundy-dark);display:flex;flex-direction:column;z-index:101; }
    .sidebar-brand { padding:24px 20px;border-bottom:1px solid rgba(201,169,110,0.3); }
    .sidebar-brand .name { font-family:'Cormorant Garant',serif;font-size:1.8rem;font-weight:600;color:var(--gold);letter-spacing:0.1em; }
    .sidebar-brand .sub { font-size:0.72rem;color:rgba(255,255,255,0.5);letter-spacing:0.2em;text-transform:uppercase; }
    .sidebar-nav { flex:1;padding:16px 0; }
    .side-item { display:flex;align-items:center;gap:12px;padding:13px 24px;background:none;border:none;width:100%;cursor:pointer;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;font-size:0.88rem;font-weight:500;transition:all 0.2s;text-align:left; }
    .side-item .icon { font-size:1.1rem;width:20px;text-align:center; }
    .side-item:hover { background:rgba(255,255,255,0.08);color:var(--white); }
    .side-item.active { background:rgba(201,169,110,0.2);color:var(--gold);border-right:3px solid var(--gold); }
    .sidebar-footer { padding:16px 24px;border-top:1px solid rgba(201,169,110,0.2); }
    .content-area { margin-left:240px; }
    .topbar { display:none; }
    .desktop-user { display:block;padding:16px 24px;border-top:1px solid rgba(201,169,110,0.2); }
    .desktop-user .d-name { color:var(--white);font-weight:600;font-size:0.9rem; }
    .desktop-user .d-role { color:var(--gold-light);font-size:0.78rem; }
  }

  .content-area { padding-top:60px;padding-bottom:80px;min-height:100vh; }
  @media (min-width:768px) { .content-area { padding-top:0;padding-bottom:0; } }
  .page { display:none;padding:24px 20px;max-width:1200px; }
  .page.active { display:block; }
  @media (min-width:768px) { .page { padding:32px; } }
  .page-title { font-family:'Cormorant Garant',serif;font-size:1.8rem;font-weight:600;color:var(--burgundy);margin-bottom:4px; }
  .page-subtitle { font-size:0.85rem;color:var(--gray);margin-bottom:24px; }
  .stats-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:28px; }
  @media (min-width:768px) { .stats-grid { grid-template-columns:repeat(4,1fr); } }
  .stat-card { background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden; }
  .stat-card::before { content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:var(--blush);border-radius:0 16px 0 60px; }
  .stat-card .icon { font-size:1.4rem;margin-bottom:10px; }
  .stat-card .value { font-family:'Cormorant Garant',serif;font-size:1.8rem;font-weight:700;color:var(--burgundy);line-height:1;margin-bottom:4px; }
  .stat-card .label { font-size:0.75rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em; }
  .section-title { font-family:'Cormorant Garant',serif;font-size:1.2rem;font-weight:600;color:var(--burgundy);margin-bottom:16px;display:flex;align-items:center;gap:10px; }
  .section-title::after { content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-light),transparent); }
  .card { background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px; }
  .product-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:16px; }
  @media (min-width:600px) { .product-grid { grid-template-columns:repeat(3,1fr); } }
  @media (min-width:900px) { .product-grid { grid-template-columns:repeat(4,1fr); } }
  .product-card { background:var(--white);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:transform 0.2s;cursor:pointer; }
  .product-card:hover { transform:translateY(-4px); }
  .product-img { width:100%;aspect-ratio:3/4;background:var(--blush);display:flex;align-items:center;justify-content:center;font-size:3rem; }
  .product-info { padding:14px; }
  .product-name { font-family:'Cormorant Garant',serif;font-size:1.05rem;font-weight:600;color:var(--charcoal);margin-bottom:4px;line-height:1.2; }
  .product-ref { font-size:0.72rem;color:var(--gray);margin-bottom:6px; }
  .product-price { font-size:0.95rem;font-weight:600;color:var(--burgundy);margin-bottom:6px; }
  .product-meta { display:flex;gap:6px;flex-wrap:wrap; }
  .tag { font-size:0.7rem;padding:3px 8px;border-radius:20px;font-weight:500; }
  .tag-size { background:var(--blush);color:var(--burgundy); }
  .tag-stock-ok { background:#E8F5E8;color:var(--success); }
  .tag-stock-low { background:#FFF3CD;color:var(--warning); }
  .tag-stock-out { background:#FFE5E5;color:var(--danger); }
  .table-wrap { overflow-x:auto; }
  table { width:100%;border-collapse:collapse;font-size:0.88rem; }
  th { background:var(--blush);color:var(--burgundy);font-weight:600;text-transform:uppercase;font-size:0.72rem;padding:12px 16px;text-align:left;white-space:nowrap; }
  td { padding:13px 16px;border-bottom:1px solid var(--gray-light); }
  tr:hover td { background:var(--ivory); }
  tr:last-child td { border-bottom:none; }
  .filter-bar { display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center; }
  .search-box { flex:1;min-width:200px;position:relative; }
  .search-box input { width:100%;padding:11px 16px 11px 42px;border:1.5px solid var(--gold-light);border-radius:10px;font-size:0.9rem;background:var(--white);color:var(--charcoal);outline:none; }
  .search-box input:focus { border-color:var(--burgundy); }
  .search-box .search-icon { position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray); }
  .filter-select { padding:11px 14px;border:1.5px solid var(--gold-light);border-radius:10px;font-size:0.88rem;background:var(--white);color:var(--charcoal);outline:none;cursor:pointer; }
  .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--white);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-header { padding:24px 28px 0;display:flex;align-items:flex-start;justify-content:space-between; }
  .modal-title { font-family:'Cormorant Garant',serif;font-size:1.4rem;font-weight:600;color:var(--burgundy); }
  .modal-close { background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--gray);padding:4px; }
  .modal-body { padding:20px 28px 28px; }
  .sale-item-row { display:flex;align-items:center;gap:10px;padding:12px;background:var(--ivory);border-radius:10px;margin-bottom:10px; }
  .sale-item-info { flex:1; }
  .sale-item-name { font-weight:600;font-size:0.9rem; }
  .sale-item-ref { font-size:0.75rem;color:var(--gray); }
  .sale-item-price { font-weight:600;color:var(--burgundy);font-size:0.9rem; }
  .qty-control { display:flex;align-items:center;gap:8px; }
  .qty-btn { width:28px;height:28px;background:var(--blush);border:none;border-radius:6px;cursor:pointer;font-size:1.1rem;color:var(--burgundy);display:flex;align-items:center;justify-content:center;font-weight:700; }
  .qty-num { font-weight:600;min-width:24px;text-align:center; }
  .sale-total-bar { display:flex;justify-content:space-between;align-items:center;background:var(--burgundy);color:var(--white);padding:16px 20px;border-radius:12px;margin-top:16px; }
  .sale-total-value { font-family:'Cormorant Garant',serif;font-size:1.6rem;font-weight:700;color:var(--gold); }
  .toast { position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--charcoal);color:var(--white);padding:12px 24px;border-radius:24px;font-size:0.88rem;font-weight:500;z-index:300;white-space:nowrap;animation:fadeInOut 2.8s ease forwards;border-left:4px solid var(--gold); }
  @media (min-width:768px) { .toast { bottom:32px; } }
  @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }
  .pay-opts { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px; }
  .pay-opt { padding:12px 8px;border:1.5px solid var(--gold-light);border-radius:10px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--white);font-size:0.82rem;font-weight:500;color:var(--gray); }
  .pay-opt .pay-icon { font-size:1.4rem;display:block;margin-bottom:4px; }
  .pay-opt.selected { border-color:var(--burgundy);background:var(--blush);color:var(--burgundy); }
  .report-tabs { display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap; }
  .report-tab { padding:8px 20px;border:1.5px solid var(--gold-light);border-radius:20px;cursor:pointer;background:var(--white);font-size:0.85rem;font-weight:500;color:var(--gray);transition:all 0.2s; }
  .report-tab.active { background:var(--burgundy);color:var(--white);border-color:var(--burgundy); }
  .user-card { display:flex;align-items:center;gap:16px;padding:16px;background:var(--white);border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px; }
  .user-avatar { width:48px;height:48px;background:var(--burgundy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garant',serif;font-size:1.2rem;font-weight:700;color:var(--gold);flex-shrink:0; }
  .user-info { flex:1; }
  .user-name { font-weight:600;font-size:0.95rem; }
  .user-role-badge { display:inline-block;font-size:0.7rem;font-weight:600;padding:2px 10px;border-radius:20px;margin-top:3px; }
  .role-admin { background:var(--blush);color:var(--burgundy); }
  .role-employee { background:var(--gold-light);color:#8B6914; }
  .form-row { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
  @media (max-width:480px) { .form-row { grid-template-columns:1fr; } }
  .empty-state { text-align:center;padding:60px 20px; }
  .empty-state .empty-icon { font-size:3rem;margin-bottom:12px;opacity:0.4; }
  .empty-state p { color:var(--gray);font-size:0.9rem; }
  .flex-between { display:flex;align-items:center;justify-content:space-between; }
  .mb-16 { margin-bottom:16px; }
  .fw-bold { font-weight:700; }
  .text-success { color:var(--success); }
  .sale-row { display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-light); }
  .sale-row:last-child { border-bottom:none; }
  .sale-row-left { display:flex;align-items:center;gap:12px; }
  .sale-dot { width:36px;height:36px;background:var(--blush);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem; }
  .sale-info .sale-name { font-weight:600;font-size:0.88rem; }
  .sale-info .sale-meta { font-size:0.75rem;color:var(--gray); }
  .sale-amount { font-weight:700;color:var(--burgundy);font-size:0.95rem; }
  .low-stock-item { display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-light); }
  .low-stock-item:last-child { border-bottom:none; }
  .low-stock-info { flex:1; }
  .low-stock-name { font-weight:600;font-size:0.9rem; }
  .low-stock-detail { font-size:0.78rem;color:var(--gray); }
  .low-stock-qty { font-family:'Cormorant Garant',serif;font-size:1.4rem;font-weight:700;color:var(--warning); }
  .sync-badge { display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--gold-light);margin-left:8px; }
  .sync-dot { width:6px;height:6px;background:#4CAF50;border-radius:50%;animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand-logo"><div class="ribbon">By Nikky</div></div>
    <div class="brand-tagline">Boutique de moda exclusiva</div>
    <div class="gold-divider"></div>
    <div class="form-group"><label>Usuario</label><input type="text" id="loginUser" placeholder="Ingresa tu usuario" autocomplete="off"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary" onclick="doLogin()">Iniciar Sesión</button>
    <div style="margin-top:24px;padding:16px;background:var(--ivory);border-radius:10px;font-size:0.8rem;color:var(--gray);text-align:left;">
      <strong style="color:var(--burgundy)">Accesos de prueba:</strong><br>
      🌸 Administradora: <code>admin</code> / <code>1234</code><br>
      💼 Empleada: <code>empleada</code> / <code>1234</code>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">By Nikky <span class="sync-badge"><span class="sync-dot"></span>En línea</span></div>
    <div class="topbar-right">
      <div class="user-pill">
        <div class="avatar" id="topAvatar">N</div>
        <div><div class="name" id="topName">—</div><div class="role" id="topRole">—</div></div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Salir">✕</button>
    </div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="name">By Nikky</div><div class="sub">Boutique</div></div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="desktop-user"><div class="d-name" id="sideUser">—</div><div class="d-role" id="sideRole">—</div></div>
    <div class="sidebar-footer"><button class="btn btn-outline" style="color:var(--gold-light);border-color:rgba(201,169,110,0.4);width:100%" onclick="doLogout()">Cerrar Sesión</button></div>
  </div>
  <div class="content-area">
    <div class="page active" id="page-dashboard">
      <div class="page-title">Panel Principal</div>
      <div class="page-subtitle" id="dashDate">—</div>
      <div class="stats-grid" id="statsGrid"></div>
      <div style="display:grid;gap:20px;">
        <div class="card"><div class="section-title">Ventas de Hoy</div><div id="todaySalesList"></div></div>
        <div class="card"><div class="section-title">Stock Bajo ⚠️</div><div id="lowStockList"></div></div>
      </div>
    </div>
    <div class="page" id="page-inventory">
      <div class="flex-between mb-16">
        <div><div class="page-title">Inventario</div><div class="page-subtitle">Gestión de prendas</div></div>
        <button class="btn btn-primary btn-sm" id="addProductBtn" onclick="openProductModal()">+ Agregar</button>
      </div>
      <div class="filter-bar">
        <div class="search-box"><span class="search-icon">🔍</span><input type="text" placeholder="Buscar prenda..." id="searchInv" oninput="renderInventory()"></div>
        <select class="filter-select" id="filterCat" onchange="renderInventory()">
          <option value="">Todas las categorías</option>
          <option>Blusa</option><option>Pantalón</option><option>Vestido</option><option>Falda</option><option>Chaqueta</option><option>Conjunto</option><option>Otro</option>
        </select>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </div>
    <div class="page" id="page-sales">
      <div class="page-title">Registrar Venta</div>
      <div class="page-subtitle">Busca prendas y agrega al carrito</div>
      <div class="filter-bar"><div class="search-box"><span class="search-i
